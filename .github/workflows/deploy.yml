name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Compute site metadata
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"

          # Assumptions:
          # - project site repo example: vyro1217/30birthday -> base /30birthday/
          # - user site repo example:    vyro1217/vyro1217.github.io -> base /
          if [ "${REPO_NAME,,}" = "${OWNER,,}.github.io" ]; then
            BASE_PATH="/"
            SITE_URL="https://${OWNER}.github.io"
          else
            BASE_PATH="/${REPO_NAME}/"
            SITE_URL="https://${OWNER}.github.io/${REPO_NAME}"
          fi

          echo "VITE_BASE_PATH=${BASE_PATH}" >> "$GITHUB_ENV"
          echo "VITE_SITE_URL=${SITE_URL}" >> "$GITHUB_ENV"
          echo "VITE_OG_IMAGE_URL=${SITE_URL}/og-cover.png" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4